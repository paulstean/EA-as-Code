name: EA Architecture Review

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  copilot: write

jobs:
  architecture-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stage 1 — Structural Validation
        run: |
          echo "::group::Validating JSON structure"
          # Validate all modified JSON files are well-formed
          git diff --name-only --diff-filter=AM origin/main...HEAD -- '*.json' | while read -r file; do
            if [ -f "$file" ]; then
              echo "Validating: $file"
              python3 -m json.tool "$file" > /dev/null || { echo "::error::Invalid JSON in $file"; exit 1; }
            fi
          done
          echo "::endgroup::"

      - name: Stage 2 — Compute Diff Summary
        id: diff
        run: |
          echo "::group::Computing change summary"
          python3 << 'PYEOF'
          import json, subprocess, os

          catalogs = [
            "BusinessUnits", "BusinessProcesses", "BusinessActivities",
            "DataDomains", "DataEntities", "ApplicationComponents",
            "InformationFlows", "InfrastructureComponents",
            "BusinessUserGroups", "Permissions", "TechnologyStandards"
          ]

          result = {}
          for cat in catalogs:
              path = f"catalogs/{cat}/{cat}.json"
              if not os.path.exists(path):
                  continue
              added = modified = removed = 0
              try:
                  proc = subprocess.run(
                      ["git", "diff", "origin/main...HEAD", "--", path],
                      capture_output=True, text=True, cwd=os.getcwd()
                  )
                  diff = proc.stdout
                  for line in diff.split("\n"):
                      if line.startswith("+") and not line.startswith("+++") and not line.startswith("---"):
                          added += 1
                      elif line.startswith("-") and not line.startswith("---") and not line.startswith("+++"):
                          removed += 1
                  # approximate: lines added beyond first + last
                  modified = min(added, removed)
                  added -= modified
                  removed -= modified
              except:
                  pass
              if added or modified or removed:
                  result[cat] = {"added": added, "modified": modified, "removed": removed}

          print(json.dumps(result))
          with open(os.environ.get("GITHUB_OUTPUT"), "a") as f:
              f.write(f"summary={json.dumps(result)}\n")
          PYEOF
          echo "::endgroup::"

      - name: Stage 3 — Rule Assessment (AI Agent)
        uses: github/copilot-code-review@v2
        with:
          language: markdown
          rules-path: rules/
          post-comment: false
          comment-summary: false
          model: gpt-4o
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage 4 — Post Architecture Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const summary = JSON.parse('${{ steps.diff.outputs.summary }}' || '{}');

            let table = "| Catalog | Added | Modified | Removed |\n|---|---|---|---|\n";
            for (const [cat, counts] of Object.entries(summary)) {
              table += `| ${cat} | ${counts.added} | ${counts.modified} | ${counts.removed} |\n`;
            }

            const body = `## Architecture Review\n\n### Change Summary\n\n${table}\n\n### Rule Assessment\n\nSee the review comments above for detailed rule-by-rule assessment from the AI agent.\n\n### Overall\n\nThe AI agent has reviewed this PR against all governance skill files in \`rules/\`. Please review the agent feedback above.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith("## Architecture Review"));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
