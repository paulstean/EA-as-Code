<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EA Visualiser</title>
<meta name="color-scheme" content="dark light">
<script src="https://unpkg.com/vis-network@9.1.2/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-card: #0f3460;
  --text-primary: #e8e8e8;
  --text-secondary: #8899b4;
  --text-muted: #5a6a84;
  --border: #2a2a4a;
  --accent: #4fc3f7;
  --shadow: rgba(0,0,0,0.4);
  --hover-highlight: rgba(79,195,247,0.15);
  --success: #2ecc71;
  --error: #e74c3c;
  --graph-bg: #1a1a2e;
  --node-font: #e8e8e8;
  --panel-bg: #16213e;
  --swatch-alpha: 15%;
}
[data-theme="light"] {
  --bg-primary: #f5f7fa;
  --bg-secondary: #ffffff;
  --bg-card: #eef1f5;
  --text-primary: #1a1a2e;
  --text-secondary: #555577;
  --text-muted: #9999bb;
  --border: #d0d5e0;
  --accent: #1976d2;
  --shadow: rgba(0,0,0,0.1);
  --hover-highlight: rgba(25,118,210,0.1);
  --graph-bg: #f5f7fa;
  --node-font: #1a1a2e;
  --panel-bg: #ffffff;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-primary)}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border);height:48px;flex-shrink:0}
header h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
#themeToggle{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:16px;color:var(--text-primary)}
.toolbar{display:flex;gap:6px}
.toolbar button{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;color:var(--text-secondary);transition:all 0.15s}
.toolbar button:hover{background:var(--hover-highlight);color:var(--text-primary);border-color:var(--accent)}
.toolbar button:disabled{opacity:0.4;cursor:not-allowed}
.popover-trigger{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.popover-trigger label{font-size:12px;color:var(--text-secondary);cursor:pointer}
.popover-trigger .toggle-wrap{display:flex;align-items:center;gap:6px}
.popover-trigger select{background:var(--bg-primary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:12px;padding:2px 6px;cursor:pointer}

/* Tab bar */
#tabBar{display:none;align-items:center;background:var(--bg-primary);border-bottom:1px solid var(--border);height:32px;flex-shrink:0;overflow:hidden}
.tabs-scroll{display:flex;align-items:center;flex:1;overflow-x:auto;overflow-y:hidden;scrollbar-width:thin}
.tabs-scroll::-webkit-scrollbar{height:2px}
.tabs-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:1px}
.tab{display:flex;align-items:center;gap:4px;padding:4px 10px;font-size:12px;color:var(--text-secondary);cursor:pointer;border-right:1px solid var(--border);white-space:nowrap;user-select:none;transition:background 0.12s;min-width:0}
.tab:hover{background:var(--hover-highlight)}
.tab.active{background:var(--bg-secondary);color:var(--accent);font-weight:600}
.tab-name{overflow:hidden;text-overflow:ellipsis}
.tab-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;opacity:0;transition:opacity 0.12s;flex-shrink:0}
.tab:hover .tab-close{opacity:1}
.tab-close:hover{color:var(--error)}
#newTabBtn{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:18px;padding:0 12px;height:100%;transition:color 0.12s;flex-shrink:0}
#newTabBtn:hover{color:var(--accent)}
.tab-edit-input{background:var(--bg-primary);border:1px solid var(--accent);border-radius:3px;color:var(--text-primary);font-size:12px;padding:1px 4px;width:80px;outline:none}

/* Modal overlay */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:3000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:20px;min-width:320px;max-width:420px;box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text-primary)}
.modal-body{font-size:13px;color:var(--text-secondary);margin-bottom:16px;line-height:1.5}
.modal-options{display:flex;flex-direction:column;gap:8px}
.modal-btn{background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text-primary);text-align:left;transition:all 0.12s}
.modal-btn:hover{background:var(--hover-highlight);border-color:var(--accent)}
.modal-btn-cancel{background:transparent;border:1px solid var(--border);border-radius:6px;padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text-muted);text-align:center;transition:all 0.12s}
.modal-btn-cancel:hover{color:var(--text-primary);border-color:var(--text-muted)}
.modal-footer{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.modal-btn-warn{background:var(--error);border:1px solid var(--error);border-radius:6px;padding:8px 14px;cursor:pointer;font-size:13px;color:#fff;text-align:center;transition:all 0.12s;font-weight:600}
.modal-btn-warn:hover{opacity:0.85}

/* Main layout */
#app{display:flex;flex-direction:column;height:100vh}

#main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
#sidebar{width:560px;min-width:560px;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
#sidebar > *{padding:12px 14px;border-bottom:1px solid var(--border)}
#sidebar > :last-child{border-bottom:none}

/* Open button */
#openBtn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border:1px solid var(--accent);border-radius:8px;background:transparent;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s}
#openBtn:hover{background:var(--accent);color:var(--bg-primary)}
#openBtn:disabled{opacity:0.5;cursor:not-allowed}
#openBtn.error{color:var(--error);border-color:var(--error)}
#openBtn.error:hover{background:var(--error);color:#fff}
#toast{font-size:12px;margin-top:6px;min-height:18px}

/* Select / Deselect all */
#selectAllBar{display:flex;gap:12px;padding:4px 14px 8px}
#selectAllBar a{font-size:12px;color:var(--accent);cursor:pointer;text-decoration:none}
#selectAllBar a:hover{text-decoration:underline}
.empty-catalogs{font-size:12px;color:var(--text-muted);padding:8px 0}

/* Search */
#searchInput{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg-primary);color:var(--text-primary);font-size:13px;outline:none;transition:border 0.15s}
#searchInput:focus{border-color:var(--accent)}
#searchInput::placeholder{color:var(--text-muted)}
.physics-slider{-webkit-appearance:none;appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none;cursor:pointer;vertical-align:middle}
.physics-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.physics-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.physics-label{min-width:95px;display:inline-block}

/* Catalog groups */
#catalogList{display:flex;flex-direction:column;gap:2px}
.cat-group{border:1px solid var(--border);border-radius:6px;overflow:hidden}
.cat-header{display:flex;align-items:center;gap:6px;padding:6px 8px;cursor:pointer;font-size:13px;user-select:none;transition:background 0.1s}
.cat-header:hover{background:var(--hover-highlight)}
.cat-toggle{font-size:10px;color:var(--text-muted);width:14px;text-align:center;flex-shrink:0;transition:transform 0.15s}
.cat-toggle.open{transform:rotate(90deg)}
.cat-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15)}
.cat-name{flex:1;font-weight:500;color:var(--text-primary)}
.cat-count{font-size:11px;color:var(--text-muted);white-space:nowrap}
.cat-master{accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.cat-entries{display:none;border-top:1px solid var(--border);padding:2px 0;max-height:200px;overflow-y:auto}
.cat-entries.open{display:block}
.entry-item{display:flex;align-items:center;gap:6px;padding:3px 8px 3px 28px;font-size:12px;cursor:pointer;transition:background 0.1s}
.entry-item:hover{background:var(--hover-highlight)}
.entry-item input[type="checkbox"]{accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.entry-name{color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-id{color:var(--text-muted);font-size:10px;font-family:monospace;flex-shrink:0}

/* Legend */
#legend{display:flex;flex-direction:column;gap:3px}
.lgd-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:2px 0}
.lgd-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.lgd-name{flex:1;color:var(--text-secondary)}
.lgd-count{color:var(--text-muted);font-size:11px}

/* Graph */
#graphContainer{flex:1;position:relative;overflow:hidden;background:var(--graph-bg)}
#graph{width:100%;height:100%}
#emptyState{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-muted);font-size:15px;text-align:center;pointer-events:none;display:none}

/* Detail panel */
#detailPanel{display:none;background:var(--panel-bg);border-top:1px solid var(--border);max-height:280px;overflow-y:auto;flex-shrink:0;transition:max-height 0.2s}
#detailPanel.open{display:block}
#detailPanel .dp-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel-bg);z-index:2}
#detailPanel .dp-header h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
#detailPanel .dp-close{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:14px;color:var(--text-secondary)}
#detailPanel .dp-body{padding:10px 16px 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px 24px}
#detailPanel .dp-section{min-width:0}
#detailPanel .dp-section h3{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:6px;font-weight:600}
#detailPanel .dp-field{display:flex;justify-content:space-between;gap:12px;padding:2px 0;font-size:13px;line-height:1.5}
#detailPanel .dp-field .dp-label{color:var(--text-secondary);white-space:nowrap}
#detailPanel .dp-field .dp-value{color:var(--text-primary);text-align:right;max-width:60%;word-break:break-word}
#detailPanel .dp-field .dp-value a{color:var(--accent);cursor:pointer;text-decoration:none}
#detailPanel .dp-field .dp-value a:hover{text-decoration:underline}
#detailPanel .dp-field .dp-value .dimmed{color:var(--text-muted);cursor:default}
#detailPanel .dp-rel{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:13px}
#detailPanel .dp-rel .arrow{color:var(--text-muted);flex-shrink:0}
#detailPanel .dp-rel .rel-target{color:var(--accent);cursor:pointer}
#detailPanel .dp-rel .rel-target:hover{text-decoration:underline}
#detailPanel .dp-rel .rel-desc{color:var(--text-secondary);font-size:12px}
#detailPanel .dp-section.empty{color:var(--text-muted);font-size:12px;font-style:italic}
#relPopover{display:none;position:fixed;z-index:2000;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:6px 0;min-width:200px;max-width:640px;box-shadow:0 6px 24px rgba(0,0,0,0.5);font-size:12px}
#relPopover .pop-header{padding:6px 12px 8px;color:var(--text-muted);font-size:11px;border-bottom:1px solid var(--border)}
#relPopover .pop-empty{padding:12px;color:var(--text-muted);text-align:center;font-style:italic}
#relPopover .pop-item{padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.12s}
#relPopover .pop-item:hover{background:var(--hover-highlight)}
#relPopover .pop-item .pop-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0}
#relPopover .pop-item .pop-name{color:var(--text-primary);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#relPopover .pop-item .pop-desc{color:var(--text-secondary);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Text box layer */
#textBoxLayer{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}

/* Text box */
.text-box{position:absolute;pointer-events:auto;background:#d3d3d3;color:#000;border-radius:6px;padding:8px;font-size:13px;line-height:1.4;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.3);min-width:30px;min-height:20px;cursor:move;user-select:none}
.text-box-content{outline:none;width:100%;height:100%;cursor:text;user-select:text;white-space:pre-wrap;overflow-wrap:break-word;min-height:1em}
.text-box-content:empty::before{content:attr(data-placeholder);color:#888}
.text-box .resize-handle{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nwse-resize;pointer-events:auto}
.text-box .resize-handle::after{content:'';position:absolute;bottom:2px;right:2px;width:8px;height:8px;border-right:2px solid #666;border-bottom:2px solid #666}

/* Context menu */
#contextMenu{display:none;position:fixed;z-index:2500;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:4px 0;min-width:160px;box-shadow:0 6px 24px rgba(0,0,0,0.5);font-size:13px;overflow:hidden}
#contextMenu .ctx-item{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.12s;color:var(--text-primary);white-space:nowrap}
#contextMenu .ctx-item:hover{background:var(--hover-highlight)}
#contextMenu .ctx-item .ctx-icon{font-size:14px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
<header>
  <h1>&#x26A1; EA Visualiser</h1>
  <button id="themeToggle" title="Toggle theme">&#x2600;&#xFE0F;</button>
  <div class="toolbar">
    <button id="saveStateBtn" title="Save state to JSON" disabled>&#x1F4BE; Save</button>
    <button id="loadStateBtn" title="Load state from JSON" disabled>&#x1F4C1; Load</button>
  </div>
</header>
<div id="tabBar">
  <div class="tabs-scroll" id="tabsScroll"></div>
</div>
<div id="main">
  <aside id="sidebar">
    <div>
      <button id="openBtn">&#x1F4C2; Open Repository</button>
      <div id="toast"></div>
    </div>
    <div>
      <strong style="font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);display:block;margin-bottom:6px">Catalogs</strong>
      <div id="catalogList"><div class="empty-catalogs">Open a repository first</div></div>
    </div>
    <div id="selectAllBar" style="display:none">
      <a href="#" id="selectAll">Select All</a>
      <a href="#" id="deselectAll">Deselect All</a>
    </div>
    <div>
      <input id="searchInput" type="text" placeholder="&#x1F50D; Filter nodes by name or description..." disabled>
    </div>
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <strong style="font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted)">Physics</strong>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <span style="font-size:11px;color:var(--text-secondary)">Enabled</span>
          <input type="checkbox" id="physicsToggle" checked style="accent-color:var(--accent);cursor:pointer">
        </label>
      </div>
      <label style="font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px">
        <span class="physics-label">Repulsion</span>
        <input type="range" class="physics-slider" id="repulsionSlider" min="10" max="2000" step="10" value="800" style="flex:1" disabled>
        <span id="repulsionValue" style="font-size:11px;color:var(--text-muted);min-width:50px;text-align:right">800</span>
      </label>
      <label style="font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px">
        <span class="physics-label">Spring</span>
        <input type="range" class="physics-slider" id="springSlider" min="10" max="400" step="5" value="150" style="flex:1" disabled>
        <span id="springValue" style="font-size:11px;color:var(--text-muted);min-width:50px;text-align:right">150</span>
      </label>
      <label style="font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px">
        <span class="physics-label">Central Gravity</span>
        <input type="range" class="physics-slider" id="gravitySlider" min="0" max="1" step="0.01" value="0.1" style="flex:1" disabled>
        <span id="gravityValue" style="font-size:11px;color:var(--text-muted);min-width:50px;text-align:right">0.10</span>
      </label>
      <label style="font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px">
        <span class="physics-label">Damping</span>
        <input type="range" class="physics-slider" id="dampingSlider" min="0" max="1" step="0.01" value="0.09" style="flex:1" disabled>
        <span id="dampingValue" style="font-size:11px;color:var(--text-muted);min-width:50px;text-align:right">0.09</span>
      </label>
      <label style="font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px">
        <span class="physics-label">Spring Const</span>
        <input type="range" class="physics-slider" id="springConstSlider" min="0.001" max="0.1" step="0.001" value="0.01" style="flex:1" disabled>
        <span id="springConstValue" style="font-size:11px;color:var(--text-muted);min-width:55px;text-align:right">0.010</span>
      </label>
      <label style="font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px">
        <span class="physics-label">Max Velocity</span>
        <input type="range" class="physics-slider" id="maxVelSlider" min="1" max="50" step="1" value="15" style="flex:1" disabled>
        <span id="maxVelValue" style="font-size:11px;color:var(--text-muted);min-width:50px;text-align:right">15</span>
      </label>
      <label style="font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px">
        <span class="physics-label">Edge Curvature</span>
        <input type="range" class="physics-slider" id="curvatureSlider" min="0" max="1" step="0.01" value="0.1" style="flex:1">
        <span id="curvatureValue" style="font-size:11px;color:var(--text-muted);min-width:50px;text-align:right">0.10</span>
      </label>
    </div>
    <div>
      <strong style="font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);display:block;margin-bottom:6px">Legend</strong>
      <div id="legend"><div class="empty-catalogs">No catalogs loaded</div></div>
    </div>
    <div class="popover-trigger">
      <label for="popoverMode">Popover trigger</label>
      <div class="toggle-wrap">
        <select id="popoverMode" disabled>
          <option value="hover">Hover</option>
          <option value="rightclick">Right-click</option>
        </select>
      </div>
    </div>
  </aside>
  <div id="graphContainer">
    <div id="graph"></div>
    <div id="emptyState">Open a repository and select catalogs to begin</div>
    <div id="textBoxLayer"></div>
  </div>
  <div id="relPopover"></div>
  <div id="contextMenu"></div>
</div>
<aside id="detailPanel">
  <div class="dp-header">
    <h2 id="dpTitle"></h2>
    <button class="dp-close" id="dpClose">&times;</button>
  </div>
  <div class="dp-body" id="dpBody"></div>
</aside>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────
const CATALOG_COLORS = {
  BusinessUnits: '#e74c3c',
  BusinessProcesses: '#e67e22',
  BusinessActivities: '#f39c12',
  BusinessUserGroups: '#2ecc71',
  DataDomains: '#1abc9c',
  DataEntities: '#3498db',
  ApplicationComponents: '#9b59b6',
  InformationFlows: '#34495e',
  InfrastructureComponents: '#7f8c8d',
  Permissions: '#e84393',
  TechnologyStandards: '#00cec9',
};

const RELATION_COLORS = [
  { match: /contain|child/i, color: '#95a5a6', label: 'Self-referential' },
  { match: /own|belong/i, color: '#e67e22', label: 'Belongs to / Owned by' },
  { match: /perform/i, color: '#2ecc71', label: 'Performed by' },
  { match: /support/i, color: '#3498db', label: 'Supported by' },
  { match: /use|uses/i, color: '#9b59b6', label: 'Uses Technology' },
  { match: /host/i, color: '#7f8c8d', label: 'Hosted on' },
  { match: /send|originate/i, color: '#e74c3c', label: 'Sends information' },
  { match: /receiv|terminate/i, color: '#e74c3c', label: 'Receives information' },

// ─── IndexedDB helpers ────────────────────────────────────────
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('ea-vis', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('store');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbSet(key, val) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('store', 'readwrite');
    tx.objectStore('store').put(val, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbGet(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('store', 'readonly');
    const req = tx.objectStore('store').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function formatFieldName(name) {
  return FIELD_LABELS[name] || name
    .replace(/([A-Z])/g, ' $1')
    .replace(/^./, s => s.toUpperCase())
    .replace(/ I d( |$)/g, ' ID$1').replace(/ Ids/g, ' IDs')
    .trim();
}

function hexAlpha(hex, alpha) {
  const a = Math.round(alpha * 255).toString(16).padStart(2, '0');
  return hex + a;
}

function toTitle(str) {
  return str.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase()).trim();
}

function genTabId() {

  return state.tabs.find(t => t.id === state.activeTabId) || null;
}

function persistTabList() {
  try {
    localStorage.setItem('ea-vis-tabs', JSON.stringify(state.tabs));
  } catch (_) {}
}

function markTabDirty() {
  if (state.tabLoadGuard || !state.activeTabId) return;
  const tab = getActiveTab();
  if (tab && tab.saved) {
    tab.saved = false;
    persistTabList();
    renderTabBar();
  }
}

function markTabSaved() {
  if (!state.activeTabId) return;
  const tab = getActiveTab();
  if (tab) {
    tab.saved = true;
    persistTabList();
    renderTabBar();
  }
}

function getActiveViewState() {
  const positions = state.network ? state.network.getPositions() : {};
  return {
    visibleEntries: [...state.visibleEntries],
    expandedCatalogs: [...state.expandedCatalogs],
    searchTerm: state.searchTerm || '',

      gravity: parseFloat(gravitySlider.value),
      damping: parseFloat(dampingSlider.value),

      curvature: parseFloat(curvatureSlider.value),
    },

    positions: positions,
    textBoxes: state.textBoxes.map(function(tb) { return { id: tb.id, text: tb.text, x: tb.x, y: tb.y, width: tb.width, height: tb.height }; }),
  };
}

function saveTabViewState(tabId) {

    localStorage.setItem('ea-vis-tab-' + tabId, JSON.stringify(vs));
  } catch (_) {}
}

function loadTabViewState(tabId) {
  try {
    const raw = localStorage.getItem('ea-vis-tab-' + tabId);
    return raw ? JSON.parse(raw) : null;
  } catch (_) { return null; }
}

function getEmptyViewState() {
  return {
    visibleEntries: [],
    expandedCatalogs: [],
    searchTerm: '',
    physics: {
      enabled: true, repulsion: 800, spring: 150, gravity: 0.1,
      damping: 0.09, springConst: 0.01, maxVel: 15, curvature: 0.1,
    },
    theme: document.documentElement.getAttribute('data-theme') || 'dark',
    popoverMode: 'hover',
    positions: {},
    textBoxes: [],
  };
}

function applyViewState(vs) {
  if (!state.network) return;
  state.tabLoadGuard = true;

  try {
    const idsToRemove = state.nodes.get().map(n => n.id);
    if (idsToRemove.length > 0) state.nodes.remove(idsToRemove);
    state.edges.clear();
    state.visibleEntries.clear();
    state.dimmedNodes.clear();
    closeDetail();

    const batch = [];
    for (const id of (vs.visibleEntries || [])) {
      const data = state.entryMap[id];
      if (!data) continue;
      const pos = vs.positions?.[id] || state.flowPositions[id];
      batch.push({
        id: id,
        label: `${toTitle(data.catalog)}\n<b>${data.entry.name.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</b>`,
        group: data.catalog,
        x: pos?.x,
        y: pos?.y,
      });
      state.visibleEntries.add(id);
    }
    if (batch.length > 0) state.nodes.add(batch);
    resolveEdges();
    emptyState.style.display = state.visibleEntries.size === 0 ? 'block' : 'none';

    state.expandedCatalogs = new Set(vs.expandedCatalogs || []);

    state.dimmedNodes.clear();
    state.searchTerm = vs.searchTerm || '';
    searchInput.value = state.searchTerm;
    const term = state.searchTerm.trim().toLowerCase();
    if (term.length > 0) {
      for (const node of state.nodes.get()) {
        const d = state.entryMap[node.id];
        if (!d) continue;
        const name = (d.entry.name || '').toLowerCase();
        const desc = (d.entry.description || '').toLowerCase();
        if (!name.includes(term) && !desc.includes(term)) state.dimmedNodes.add(node.id);
      }
    }
    updateNodeColors();

    const p = vs.physics || {};
    physicsToggle.checked = p.enabled !== false;
    const pSliders = [repulsionSlider, springSlider, gravitySlider, dampingSlider, springConstSlider, maxVelSlider];
    pSliders.forEach(s => s.disabled = !physicsToggle.checked);

    if (p.repulsion !== undefined) repulsionSlider.value = p.repulsion;
    if (p.spring !== undefined) springSlider.value = p.spring;
    if (p.gravity !== undefined) gravitySlider.value = p.gravity;
    if (p.damping !== undefined) dampingSlider.value = p.damping;
    if (p.springConst !== undefined) springConstSlider.value = p.springConst;
    if (p.maxVel !== undefined) maxVelSlider.value = p.maxVel;
    if (p.curvature !== undefined) curvatureSlider.value = p.curvature;

    if (state.network) {
      state.network.setOptions({
        physics: {
          enabled: physicsToggle.checked,
          barnesHut: {
            gravitationalConstant: -parseInt(repulsionSlider.value),
            springLength: parseInt(springSlider.value),
            centralGravity: parseFloat(gravitySlider.value),
            damping: parseFloat(dampingSlider.value),
            springConstant: parseFloat(springConstSlider.value),
            maxVelocity: parseInt(maxVelSlider.value),
          }
        },
        edges: { smooth: { type: 'curvedCW', roundness: parseFloat(curvatureSlider.value) } }
      });
    }

    repulsionValue.textContent = repulsionSlider.value;
    springValue.textContent = springSlider.value;
    gravityValue.textContent = parseFloat(gravitySlider.value).toFixed(2);
    dampingValue.textContent = parseFloat(dampingSlider.value).toFixed(2);
    springConstValue.textContent = parseFloat(springConstSlider.value).toFixed(3);
    maxVelValue.textContent = maxVelSlider.value;
    curvatureValue.textContent = parseFloat(curvatureSlider.value).toFixed(2);

    if (vs.theme) applyTheme(vs.theme);
    if (vs.popoverMode) {
      popoverMode.value = vs.popoverMode;
    }

    state.textBoxes = vs.textBoxes ? vs.textBoxes.map(function(t) { return { id: t.id, text: t.text, x: t.x, y: t.y, width: t.width, height: t.height }; }) : [];
    renderAllTextBoxes();
    renderSidebar();
  } finally {
    state.tabLoadGuard = false;
  }
}

function selectTab(tabId) {
  if (tabId === state.activeTabId || !state.network) return;
  const tab = state.tabs.find(t => t.id === tabId);
  if (!tab) return;

  saveTabViewState(state.activeTabId);
  state.activeTabId = tabId;
  const vs = loadTabViewState(tabId) || getEmptyViewState();
  applyViewState(vs);
  persistTabList();
  renderTabBar();
}

function createTab() {
  const id = genTabId();
  const n = state.tabs.length + 1;
  const tab = { id, name: 'View ' + n, saved: false };
  state.tabs.push(tab);
  state.activeTabId = id;
  const vs = getEmptyViewState();
  localStorage.setItem('ea-vis-tab-' + id, JSON.stringify(vs));
  applyViewState(vs);
  persistTabList();
  renderTabBar();
}

function closeTab(tabId) {
  const idx = state.tabs.findIndex(t => t.id === tabId);
  if (idx === -1) return;
  if (state.tabs.length === 1) return;

  if (!state.tabs[idx].saved) {
    showConfirmModal(
      'Unsaved Changes',
      '"' + state.tabs[idx].name + '" has unsaved changes. Closing will discard them. Continue?',
      function(proceed) {
        if (proceed) doCloseTab(tabId);
      }
    );
    return;
  }
  doCloseTab(tabId);
}

function doCloseTab(tabId) {
  const idx = state.tabs.findIndex(t => t.id === tabId);
  if (idx === -1) return;
  state.tabs.splice(idx, 1);
  localStorage.removeItem('ea-vis-tab-' + tabId);

  if (state.activeTabId === tabId) {
    const next = state.tabs[Math.min(idx, state.tabs.length - 1)];
    state.activeTabId = next.id;
    const vs = loadTabViewState(next.id) || getEmptyViewState();
    applyViewState(vs);
  }

  persistTabList();
  renderTabBar();
}

function renameTab(tabId, newName) {
  const tab = state.tabs.find(t => t.id === tabId);
  if (!tab) return;
  tab.name = newName;
  persistTabList();
  renderTabBar();
}

function initTabs() {
  const saved = localStorage.getItem('ea-vis-tabs');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) {
        state.tabs = parsed;
        state.activeTabId = parsed[0].id;
        const vs = loadTabViewState(parsed[0].id);
        if (vs) {
          applyViewState(vs);
        }
        renderTabBar();
        tabBar.style.display = 'flex';
        return;
      }
    } catch (_) {}
  }

  const oldVisible = localStorage.getItem('ea-vis-visible');
  const id = genTabId();
  if (oldVisible) {
    const vs = {
      visibleEntries: oldVisible.split(',').filter(Boolean),
      expandedCatalogs: (localStorage.getItem('ea-vis-expanded') || '').split(',').filter(Boolean),
      searchTerm: localStorage.getItem('ea-vis-search') || '',
      physics: {
        enabled: localStorage.getItem('ea-vis-physics') !== '0',
        repulsion: restoreInt('ea-vis-repulsion', 800, 10, 2000),
        spring: restoreInt('ea-vis-spring', 150, 10, 400),
        gravity: restoreFloat('ea-vis-gravity', 0.1, 0, 1),
        damping: restoreFloat('ea-vis-damping', 0.09, 0, 1),
        springConst: restoreFloat('ea-vis-spring-const', 0.01, 0.001, 0.1),
        maxVel: restoreInt('ea-vis-max-vel', 15, 1, 50),
        curvature: restoreFloat('ea-vis-curvature', 0.1, 0, 1),
      },
      theme: localStorage.getItem('ea-vis-theme') || 'dark',
      popoverMode: localStorage.getItem('ea-vis-popover-mode') || 'hover',
      positions: (function() { try { return JSON.parse(localStorage.getItem('ea-vis-positions') || '{}'); } catch(_) { return {}; } })(),
    };
    state.tabs = [{ id, name: 'View 1', saved: false }];
    state.activeTabId = id;
    localStorage.setItem('ea-vis-tab-' + id, JSON.stringify(vs));
    applyViewState(vs);
  } else {
    state.tabs = [{ id, name: 'View 1', saved: false }];
    state.activeTabId = id;
    const vs = getEmptyViewState();
    localStorage.setItem('ea-vis-tab-' + id, JSON.stringify(vs));
  }
  persistTabList();
  renderTabBar();
  tabBar.style.display = 'flex';
}

function renderTabBar() {
  let html = '';
  for (const tab of state.tabs) {
    const active = tab.id === state.activeTabId ? ' active' : '';
    const name = tab.saved ? tab.name : tab.name + ' \u002A';
    html += '<div class="tab' + active + '" data-id="' + tab.id + '"><span class="tab-name">' + name + '</span><button class="tab-close">&times;</button></div>';
  }
  tabsScroll.innerHTML = html;
  var plus = document.createElement('button');
  plus.id = 'newTabBtn';
  plus.textContent = '+';
  tabsScroll.appendChild(plus);
}

// ─── Modal Dialog ────────────────────────────────────────────
function showOptionModal(title, body, options, cancelLabel) {
  return new Promise(function(resolve) {
    modalTitle.textContent = title;
    modalBody.innerHTML = '<div class="modal-options">' + body + '</div>';
    modalFooter.innerHTML = '';
    var footerBtns = document.createElement('div');
    footerBtns.style.cssText = 'display:flex;gap:8px;margin-top:12px;justify-content:flex-end';
    if (cancelLabel) {
      var cancelBtn = document.createElement('button');
      cancelBtn.className = 'modal-btn-cancel';
      cancelBtn.textContent = cancelLabel;
      cancelBtn.addEventListener('click', function() { closeModal(); resolve(null); });
      footerBtns.appendChild(cancelBtn);
    }
    for (var i = 0; i < options.length; i++) {
      var opt = options[i];
      var btn = document.createElement('button');
      btn.className = opt.cls || 'modal-btn';
      btn.textContent = opt.label;
      btn.addEventListener('click', function(val) { return function() { closeModal(); resolve(val); }; }(opt.value));
      footerBtns.appendChild(btn);
    }
    modalFooter.appendChild(footerBtns);
    modalOverlay.classList.add('open');
  });
}

function showConfirmModal(title, msg, callback) {
  modalTitle.textContent = title;
  modalBody.innerHTML = '<div style="font-size:13px;color:var(--text-secondary);line-height:1.5">' + msg + '</div>';
  modalFooter.innerHTML = '';
  var btns = document.createElement('div');
  btns.style.cssText = 'display:flex;gap:8px;margin-top:12px;justify-content:flex-end';
  var cancel = document.createElement('button');
  cancel.className = 'modal-btn-cancel';
  cancel.textContent = 'Cancel';
  cancel.addEventListener('click', function() { closeModal(); callback(false); });
  btns.appendChild(cancel);
  var ok = document.createElement('button');
  ok.className = 'modal-btn-warn';
  ok.textContent = 'Proceed';
  ok.addEventListener('click', function() { closeModal(); callback(true); });
  btns.appendChild(ok);
  modalFooter.appendChild(btns);
  modalOverlay.classList.add('open');
}

function closeModal() {
  modalOverlay.classList.remove('open');
}

function saveState() {
  try {
    localStorage.setItem('ea-vis-visible', [...state.visibleEntries].join(','));
    localStorage.setItem('ea-vis-expanded', [...state.expandedCatalogs].join(','));
    localStorage.setItem('ea-vis-search', state.searchTerm);
    localStorage.setItem('ea-vis-spring', springSlider.value);
    localStorage.setItem('ea-vis-gravity', gravitySlider.value);
    localStorage.setItem('ea-vis-damping', dampingSlider.value);
    localStorage.setItem('ea-vis-spring-const', springConstSlider.value);
    localStorage.setItem('ea-vis-max-vel', maxVelSlider.value);
    localStorage.setItem('ea-vis-curvature', curvatureSlider.value);
  } catch (_) {}
}

// ─── Position persistence ────────────────────────────────────
function savePositionsToLocalStorage() {
  if (!state.network) return;
  const positions = state.network.getPositions();
  if (Object.keys(positions).length === 0) return;
  localStorage.setItem('ea-vis-positions', JSON.stringify(positions));
}

function loadSavedPositionsToState() {
  const saved = localStorage.getItem('ea-vis-positions');
  if (!saved) return;
  try {
    state.savedPositions = JSON.parse(saved);
  } catch (_) {}
}

function applySavedPositionsToNodes() {
  const positions = state.savedPositions;
  if (!positions || Object.keys(positions).length === 0) return;
  const updates = [];
  for (const node of state.nodes.get()) {
    if (positions[node.id]) {
      updates.push({ id: node.id, x: positions[node.id].x, y: positions[node.id].y });
    }
  }
  if (updates.length > 0) {
    state.nodes.update(updates);
  }
}

// ─── Restore helpers ──────────────────────────────────────────
function restoreInt(key, def, min, max) {
  const saved = parseInt(localStorage.getItem(key));
  return isNaN(saved) ? def : Math.max(min, Math.min(max, saved));
}

function restoreFloat(key, def, min, max) {
  const saved = parseFloat(localStorage.getItem(key));
  return isNaN(saved) ? def : Math.max(min, Math.min(max, saved));
}

function restoreRepulsion() { return restoreInt('ea-vis-repulsion', 800, 10, 2000); }
function restoreSpring() { return restoreInt('ea-vis-spring', 150, 10, 400); }
function restoreGravity() { return restoreFloat('ea-vis-gravity', 0.1, 0, 1); }
function restoreDamping() { return restoreFloat('ea-vis-damping', 0.09, 0, 1); }
function restoreSpringConst() { return restoreFloat('ea-vis-spring-const', 0.01, 0.001, 0.1); }
function restoreMaxVel() { return restoreInt('ea-vis-max-vel', 15, 1, 50); }
function restoreCurvature() { return restoreFloat('ea-vis-curvature', 0.1, 0, 1); }
function restorePhysicsEnabled() { return localStorage.getItem('ea-vis-physics') !== '0'; }

function restoreVisibleEntries() {
  const visible = localStorage.getItem('ea-vis-visible');
  if (!visible) return;
  const ids = visible.split(',').filter(Boolean);
  for (const id of ids) {
    if (state.entryMap[id] && !state.nodes.get(id)) {
      addEntryToGraph(id);
    }
  }
}

function restoreExpandedCatalogs() {
  const expanded = localStorage.getItem('ea-vis-expanded');
  if (!expanded) return;
  for (const cat of expanded.split(',').filter(Boolean)) {
    state.expandedCatalogs.add(cat);
  }
}

function restoreSearch() {
  const saved = localStorage.getItem('ea-vis-search');
  if (!saved) return;
  searchInput.value = saved;
  state.searchTerm = saved;
  const term = saved.trim().toLowerCase();
  if (term.length === 0) return;
  state.dimmedNodes.clear();
  for (const node of state.nodes.get()) {
    const data = state.entryMap[node.id];
    if (!data) continue;
    const name = (data.entry.name || '').toLowerCase();
    const desc = (data.entry.description || '').toLowerCase();
    if (!name.includes(term) && !desc.includes(term)) {
      state.dimmedNodes.add(node.id);
    }
  }
  updateNodeColors();
}

// ─── Tab-aware save/load ─────────────────────────────────────
async function saveActiveTabToJSON() {
  if (!window.showSaveFilePicker) {
    showToast('Save not supported in this browser (requires Chrome/Edge)', 'error');
    return;
  }
  if (state.visibleEntries.size === 0) {
    showToast('Nothing to save - select some catalog entries first', 'error');
    return;
  }
  var vs = getActiveViewState();
  var stateObj = {
    version: 1,
    visibleEntries: vs.visibleEntries,
    expandedCatalogs: vs.expandedCatalogs,
    searchTerm: vs.searchTerm,
    physics: vs.physics,
    theme: vs.theme,
    positions: vs.positions,
  };
  try {
    var handle = await window.showSaveFilePicker({
      suggestedName: 'ea-vis-state.json',
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
    });
    var writable = await handle.createWritable();
    await writable.write(new Blob([JSON.stringify(stateObj, null, 2)], { type: 'application/json' }));
    await writable.close();
    markTabSaved();
    showToast('Tab state saved', 'success');
  } catch (e) {
    if (e.name !== 'AbortError') showToast('Save failed', 'error');
  }
}

async function saveAllTabsToJSON() {
  if (!window.showSaveFilePicker) {
    showToast('Save not supported in this browser (requires Chrome/Edge)', 'error');
    return;
  }
  var tabStates = {};
  saveTabViewState(state.activeTabId);
  for (var i = 0; i < state.tabs.length; i++) {
    var tab = state.tabs[i];
    var raw = loadTabViewState(tab.id);
    if (raw) tabStates[tab.id] = raw;
  }
  var stateObj = {
    version: 1,
    multiTab: true,
    tabs: state.tabs.map(function(t) { return { id: t.id, name: t.name }; }),
    tabStates: tabStates,
  };
  try {
    var handle = await window.showSaveFilePicker({
      suggestedName: 'ea-vis-all-tabs.json',
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
    });
    var writable = await handle.createWritable();
    await writable.write(new Blob([JSON.stringify(stateObj, null, 2)], { type: 'application/json' }));
    await writable.close();
    for (var j = 0; j < state.tabs.length; j++) state.tabs[j].saved = true;
    persistTabList();
    renderTabBar();
    showToast('All tabs saved', 'success');
  } catch (e) {
    if (e.name !== 'AbortError') showToast('Save failed', 'error');
  }
}

async function loadStateToActiveTab() {
  if (!window.showOpenFilePicker) {
    showToast('Load not supported in this browser (requires Chrome/Edge)', 'error');
    return;
  }
  try {
    var [handle] = await window.showOpenFilePicker({
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
    });
    var file = await handle.getFile();
    var text = await file.text();
    var obj = JSON.parse(text);
    if (obj.multiTab) {
      showToast('This is a multi-tab file. Use "All tabs" option instead.', 'error');
      return;
    }
    if (!obj.version || !Array.isArray(obj.visibleEntries)) {
      throw new Error('Invalid state file');
    }
    var tab = getActiveTab();
    if (tab && !tab.saved) {
      var proceed = await new Promise(function(resolve) {
        showConfirmModal(
          'Unsaved Changes',
          '"' + tab.name + '" has unsaved changes. Loading will discard them. Continue?',
          resolve
        );
      });
      if (!proceed) return;
    }
    applyJSONViewState(obj);
    markTabSaved();
    showToast('State loaded', 'success');
  } catch (e) {
    if (e.name !== 'AbortError') {
      showToast('Failed to load state: ' + (e.message || 'Unknown error'), 'error');
    }
  }
}

async function loadStateToAllTabs() {
  if (!window.showOpenFilePicker) {
    showToast('Load not supported in this browser (requires Chrome/Edge)', 'error');
    return;
  }
  try {
    var [handle] = await window.showOpenFilePicker({
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
    });
    var file = await handle.getFile();
    var text = await file.text();
    var obj = JSON.parse(text);
    if (!obj.version) throw new Error('Invalid state file');

    if (obj.multiTab) {
      if (!obj.tabs || !obj.tabStates) throw new Error('Invalid multi-tab file');
      for (var i = 0; i < state.tabs.length; i++) {
        if (!state.tabs[i].saved) {
          var p = await new Promise(function(resolve) {
            showConfirmModal(
              'Unsaved Changes',
              '"' + state.tabs[i].name + '" has unsaved changes. Loading will discard them. Continue?',
              resolve
            );
          });
          if (!p) return;
          break;
        }
      }
      for (var j = 0; j < state.tabs.length; j++) {
        localStorage.removeItem('ea-vis-tab-' + state.tabs[j].id);
      }
      state.tabs = obj.tabs.map(function(t) { return { id: t.id, name: t.name, saved: true }; });
      state.activeTabId = state.tabs[0].id;
      for (var k = 0; k < state.tabs.length; k++) {
        var vs = obj.tabStates[state.tabs[k].id];
        if (vs) localStorage.setItem('ea-vis-tab-' + state.tabs[k].id, JSON.stringify(vs));
      }
      persistTabList();
      var firstVs = loadTabViewState(state.activeTabId);
      if (firstVs) applyViewState(firstVs);
      renderTabBar();
      showToast('All tabs loaded', 'success');
    } else {
      if (!Array.isArray(obj.visibleEntries)) throw new Error('Invalid state file');
      applyJSONViewState(obj);
      markTabSaved();
      showToast('State loaded', 'success');
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      showToast('Failed to load state: ' + (e.message || 'Unknown error'), 'error');
    }
  }
}

function applyJSONViewState(obj) {
  var validIds = obj.visibleEntries.filter(function(id) { return !!state.entryMap[id]; });
  if (validIds.length === 0) {
    showToast('No entries in file exist in current repo', 'error');
    return;
  }
  var missing = obj.visibleEntries.length - validIds.length;
  if (!confirm('Found ' + validIds.length + ' of ' + obj.visibleEntries.length + ' saved entries' + (missing > 0 ? ' (' + missing + ' missing)' : '') + '. Apply state?')) {
    return;
  }
  var vs = {
    visibleEntries: validIds,
    expandedCatalogs: obj.expandedCatalogs || [],
    searchTerm: obj.searchTerm || '',
    physics: obj.physics || getEmptyViewState().physics,
    theme: obj.theme || 'dark',
    popoverMode: obj.popoverMode || 'hover',
    positions: obj.positions || {},
  };
  applyViewState(vs);
}

// ─── Directory loading (File System Access API) ───────────────
async function loadFromHandle(handle) {
  state.isLoading = true;
  openBtn.disabled = true;
  openBtn.textContent = '\uD83D\uDCC2 Loading\u2026';
  openBtn.className = '';
  toast.textContent = '';

  try {
    // Find metamodel.json
    let mmHandle = null;
    try { mmHandle = await handle.getFileHandle('metamodel.json'); } catch (_) {}
    if (!mmHandle) { throw new Error('metamodel.json not found in the selected folder'); }

    const mmFile = await mmHandle.getFile();
    const meta = JSON.parse(await mmFile.text());
    state.meta = meta;

    // Parse known catalog names from metamodel
    const knownCatalogs = new Set((meta.entityTypes || []).map(e => e.catalog));
    state.loadedCatalogNames = [];

    // Walk catalogs directory
    let catalogsDir = null;
    try { catalogsDir = await handle.getDirectoryHandle('catalogs'); } catch (_) {}
    if (!catalogsDir) { throw new Error('catalogs/ directory not found'); }

    const loadedData = {};
    for await (const [dirName, dirHandle] of catalogsDir.entries()) {
      if (dirHandle.kind !== 'directory') continue;
      if (!knownCatalogs.has(dirName)) continue;
      try {
        const fileHandle = await dirHandle.getFileHandle(dirName + '.json');
        const file = await fileHandle.getFile();
        const data = JSON.parse(await file.text());
        if (!Array.isArray(data)) continue;
        loadedData[dirName] = data;
        state.loadedCatalogNames.push(dirName);
      } catch (_) {}
    }

    if (state.loadedCatalogNames.length === 0) {
      throw new Error('No matching catalog files found in catalogs/');
    }

    // Build state
    state.entries = loadedData;
    state.entryMap = {};
    for (const [cat, entries] of Object.entries(loadedData)) {
      for (const entry of entries) {
        if (entry.id) state.entryMap[entry.id] = { entry, catalog: cat };
      }
    }
    state.flowPositions = computeFlowPositions();

    // Persist handle for session restore
    try { await dbSet('dirHandle', handle); } catch (_) {}

    // Init graph
    initGraph();
    renderSidebar();

    // Restore tabs (handles entries, positions, physics, theme, popover mode, etc.)
    initTabs();

    searchInput.disabled = false;
    selectAllBar.style.display = 'flex';
    toast.textContent = `Loaded ${state.loadedCatalogNames.length} catalogs from ${handle.name}`;
    toast.style.color = 'var(--success)';
    openBtn.textContent = '\uD83D\uDCC2 Reopen';
    openBtn.className = '';
    openBtn.disabled = false;
    saveStateBtn.disabled = false;
    loadStateBtn.disabled = false;
    popoverMode.disabled = false;
    state.isLoading = false;
  } catch (err) {
    state.isLoading = false;
    openBtn.disabled = false;
    openBtn.textContent = '\uD83D\uDCC2 Open Repository';
    openBtn.className = 'error';
    toast.textContent = err.message || 'Failed to load repository';
    toast.style.color = 'var(--error)';
  }
}

async function loadRepository() {
  if (state.isLoading) return;
  try {
    const handle = await window.showDirectoryPicker({ mode: 'read', startIn: 'documents' });
    await loadFromHandle(handle);
  } catch (err) {
    if (err.name === 'AbortError' || err.name === 'SecurityError') {
      state.isLoading = false;
      openBtn.disabled = false;
      return;
    }
    state.isLoading = false;
    openBtn.disabled = false;
    openBtn.className = 'error';
    toast.textContent = err.message || 'Failed to load repository';
    toast.style.color = 'var(--error)';
  }
}

async function tryRestoreSession() {
  try {
    const handle = await dbGet('dirHandle');
    if (!handle) return;
    if (await handle.queryPermission({ mode: 'read' }) !== 'granted') {
      const result = await handle.requestPermission({ mode: 'read' });
      if (result !== 'granted') return;
    }
    await loadFromHandle(handle);
  } catch (_) {}
}

// ─── Graph ────────────────────────────────────────────────────
function initGraph() {
  if (state.network) {
    state.network.destroy();
    state.network = null;
  }
  state.nodes = new vis.DataSet([]);
  state.edges = new vis.DataSet([]);
  state.visibleEntries = new Set();
  state.expandedCatalogs = new Set();
  state.dimmedNodes = new Set();
  state.selectedNodeId = null;
  state.textBoxes = [];
  textBoxLayer.innerHTML = '';
  detailPanel.classList.remove('open');
  detailPanel.style.display = 'none';

  const groups = {};
  for (const [cat, color] of Object.entries(CATALOG_COLORS)) {
    if (!state.loadedCatalogNames.includes(cat)) continue;
    groups[cat] = {
      shape: 'box',
      color: {
        background: hexAlpha(color, 1),
        border: color,
        highlight: { background: hexAlpha(color, 1), border: color },
      },
      borderWidth: 2,
      borderWidthSelected: 3,
      font: { size: 11, face: 'Segoe UI, sans-serif', multi: true },
      shadow: { enabled: true },
      margin: { top: 6, right: 10, bottom: 6, left: 10 },
    };
  }

  const container = graphEl;
  const repulsion = restoreRepulsion();
  const spring = restoreSpring();
  const gravity = restoreGravity();
  const damping = restoreDamping();
  const springConst = restoreSpringConst();
  const maxVel = restoreMaxVel();
  const curvature = restoreCurvature();
  const options = {
    groups,
    nodes: {
      zIndex: 1,
      font: { color: '#ffffff', size: 13 },
      margin: { top: 8, right: 14, bottom: 8, left: 14 },
    },
    edges: {
      zIndex: 0,
      arrows: { to: { enabled: true, scaleFactor: 0.8 } },
      width: 1.5,
      smooth: { type: 'curvedCW', roundness: curvature },
      font: { size: 0 },
    },
    physics: {
      enabled: true,
      solver: 'barnesHut',
      barnesHut: {
        gravitationalConstant: -repulsion,
        centralGravity: gravity,
        springLength: spring,
        springConstant: springConst,
        damping: damping,
      },
      stabilization: { iterations: 1000, updateInterval: 25 },
      maxVelocity: maxVel,
      minVelocity: 0.75,
    },
    interaction: {
      hover: true,
      multiselect: false,
      navigationButtons: false,
      keyboard: false,
    },
    configure: { enabled: false },
  };

  state.network = new vis.Network(container, { nodes: state.nodes, edges: state.edges }, options);

  state.network.on('hoverNode', function(params) {
    const connectedEdges = state.network.getConnectedEdges(params.node);
    const connectedNodes = state.network.getConnectedNodes(params.node);
    const allNodes = state.nodes.get().map(n => n.id);
    const dim = allNodes.filter(id => id !== params.node && !connectedNodes.includes(id));
    for (const id of dim) {
      const cat = state.entryMap[id]?.catalog;
      if (!cat) continue;
      const color = CATALOG_COLORS[cat] || '#888';
      state.nodes.update({ id, color: { background: hexAlpha(color, 1), border: hexAlpha(color, 0.3) } });
    }
    for (const id of connectedNodes) {
      const cat = state.entryMap[id]?.catalog;
      if (!cat) continue;
      const color = CATALOG_COLORS[cat] || '#888';
      state.nodes.update({ id, color: { background: hexAlpha(color, 1), border: color } });
    }
    // Highlight the hovered node
    const hcat = state.entryMap[params.node]?.catalog;
    if (hcat) {
      const hcolor = CATALOG_COLORS[hcat] || '#888';
      state.nodes.update({ id: params.node, color: { background: hexAlpha(hcolor, 1), border: hcolor } });
    }
    if (popoverMode.value === 'hover') {
      const evt = params.event;
      const mx = evt ? evt.clientX : (params.pointer.DOM.x + graphEl.getBoundingClientRect().left);
      const my = evt ? evt.clientY : (params.pointer.DOM.y + graphEl.getBoundingClientRect().top);
      showRelationPopover(params.node, mx, my);
    }
  });

  state.network.on('blurNode', function() {
    updateNodeColors();
    if (popoverMode.value === 'hover') hideRelationPopoverDelayed();
  });

  state.network.on('dragEnd', function() {
    savePositionsToLocalStorage();
    if (!state.tabLoadGuard) markTabDirty();
  });

  state.network.on('stabilizationIterationsDone', function() {
    savePositionsToLocalStorage();
  });

  state.network.on('click', function(params) {
    if (params.nodes.length > 0) {
      showDetail(params.nodes[0]);
    } else {
      closeDetail();
    }
    if (popoverMode.value === 'rightclick') {
      relPopover.style.display = 'none';
    }
  });

  state.network.on('doubleClick', function(params) {
    if (params.nodes.length > 0) {
      state.network.focus(params.nodes[0], { scale: 1.5, animation: true });
    }
  });

  state.network.on('viewChanged', function() {
    updateTextBoxPositions();
  });

  emptyState.style.display = 'block';
}

function addEntryToGraph(entryId) {
  if (state.nodes.get(entryId)) return;
  const data = state.entryMap[entryId];
  if (!data) return;
  const { entry, catalog } = data;
  const pos = state.savedPositions[entryId] || state.flowPositions[entryId];
  state.nodes.add({
    id: entry.id,
    label: `${toTitle(catalog)}\n<b>${entry.name.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</b>`,
    group: catalog,
    x: pos?.x,
    y: pos?.y,
  });
  state.visibleEntries.add(entryId);
  resolveEdges();
  emptyState.style.display = 'none';
  markTabDirty();
}

function removeEntryFromGraph(entryId) {
  state.nodes.remove(entryId);
  const edgeIds = state.edges.get().filter(e => e.from === entryId || e.to === entryId).map(e => e.id);
  state.edges.remove(edgeIds);
  state.visibleEntries.delete(entryId);
  if (state.visibleEntries.size === 0) emptyState.style.display = 'block';
  if (state.selectedNodeId === entryId) closeDetail();
  markTabDirty();
}

function addCatalogAllToGraph(catalog) {
  const entries = state.entries[catalog] || [];
  const batch = [];
  for (const entry of entries) {
    if (state.nodes.get(entry.id)) continue;
    const pos = state.savedPositions[entry.id] || state.flowPositions[entry.id];
    batch.push({
      id: entry.id,
      label: `${toTitle(catalog)}\n<b>${entry.name.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</b>`,
      group: catalog,
      x: pos?.x,
      y: pos?.y,
    });
    state.visibleEntries.add(entry.id);
  }
  if (batch.length === 0) return;
  state.nodes.add(batch);
  resolveEdges();
  emptyState.style.display = 'none';
  markTabDirty();
}

function removeCatalogAllFromGraph(catalog) {
  const ids = state.entries[catalog]?.map(e => e.id) || [];
  const idSet = new Set(ids);
  state.nodes.remove(ids);
  const edgeIds = state.edges.get().filter(e => idSet.has(e.from) || idSet.has(e.to)).map(e => e.id);
  state.edges.remove(edgeIds);
  for (const id of ids) state.visibleEntries.delete(id);
  if (state.visibleEntries.size === 0) emptyState.style.display = 'block';
  if (state.selectedNodeId && idSet.has(state.selectedNodeId)) closeDetail();
  markTabDirty();
}

// ─── Hover popover ────────────────────────────────────────────
let popoverHideTimer = null;
const relPopover = document.getElementById('relPopover');

relPopover.addEventListener('mouseenter', function() {
  clearTimeout(popoverHideTimer);
});

relPopover.addEventListener('mouseleave', function() {
  hideRelationPopoverDelayed();
});

function getRelatedNodes(nodeId) {
  const data = state.entryMap[nodeId];
  if (!data) return [];
  const { entry, catalog } = data;

  const catalogToType = {};
  const typeToCatalog = {};
  for (const et of (state.meta?.entityTypes || [])) {
    catalogToType[et.catalog] = et.name;
    typeToCatalog[et.name] = et.catalog;
  }

  const nodeType = catalogToType[catalog];
  if (!nodeType) return [];

  const results = [];

  for (const rel of (state.meta?.relationships || [])) {
    // This node is the SOURCE — look at its viaField
    if (rel.source === nodeType) {
      const targetCatalog = typeToCatalog[rel.target];
      if (!targetCatalog) continue;
      const refVal = entry[rel.viaField];
      if (refVal == null) continue;
      const targets = Array.isArray(refVal) ? refVal : [refVal];
      for (const tid of targets) {
        if (tid == null || tid === '') continue;
        if (state.visibleEntries.has(tid)) continue;
        const te = state.entryMap[tid];
        if (!te) continue;
        results.push({ entryId: tid, label: te.entry.name, catalog: te.catalog, description: rel.description, dir: 'out' });
      }
    }

    // This node is the TARGET — scan source entries for references
    if (rel.target === nodeType) {
      const sourceCatalog = typeToCatalog[rel.source];
      if (!sourceCatalog) continue;
      const sourceEntries = state.entries[sourceCatalog] || [];
      for (const src of sourceEntries) {
        if (src.id === nodeId) continue;
        const refVal = src[rel.viaField];
        if (refVal == null) continue;
        const targets = Array.isArray(refVal) ? refVal : [refVal];
        if (!targets.includes(nodeId)) continue;
        if (state.visibleEntries.has(src.id)) continue;
        results.push({ entryId: src.id, label: src.name, catalog: sourceCatalog, description: rel.description, dir: 'in' });
      }
    }
  }

  // Deduplicate by entryId
  const seen = new Set();
  return results.filter(r => { if (seen.has(r.entryId)) return false; seen.add(r.entryId); return true; });
}

function showRelationPopover(nodeId, x, y) {
  clearTimeout(popoverHideTimer);
  const items = getRelatedNodes(nodeId);
  let html;
  if (items.length === 0) {
    html = '<div class="pop-empty">No hidden related nodes</div>';
  } else {
    html = '<div class="pop-header">Hidden related nodes</div>';
    for (const item of items) {
      const color = CATALOG_COLORS[item.catalog] || '#888';
      const arrow = item.dir === 'out' ? '&#8594;' : '&#8592;';
      html += '<div class="pop-item" data-entry="' + item.entryId + '">';
      html += '<span class="pop-swatch" style="background:' + color + '"></span>';
      html += '<span class="pop-name">' + item.label + '</span>';
      html += '<span class="pop-desc">' + arrow + ' ' + item.description + '</span>';
      html += '</div>';
    }
  }
  relPopover.innerHTML = html;
  relPopover.style.display = 'block';

  // Position: prefer below-right, flip if off-screen
  const pw = relPopover.offsetWidth;
  const ph = relPopover.offsetHeight;
  let px = x + 12;
  let py = y + 12;
  if (px + pw > window.innerWidth - 8) px = x - pw - 12;
  if (py + ph > window.innerHeight - 8) py = Math.max(8, y - ph - 12);
  if (px < 8) px = 8;
  if (py < 8) py = 8;
  relPopover.style.left = px + 'px';
  relPopover.style.top = py + 'px';

  // Wire clicks on items
  relPopover.querySelectorAll('.pop-item').forEach(el => {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      const eid = this.dataset.entry;
      if (!eid) return;
      // Check the sidebar checkbox
      const cb = document.querySelector('input[data-id="' + eid + '"]');
      if (cb && !cb.checked) cb.click();
      else if (!cb) addEntryToGraph(eid);
      relPopover.style.display = 'none';
    });
  });
}

function hideRelationPopoverDelayed() {
  clearTimeout(popoverHideTimer);
  popoverHideTimer = setTimeout(function() {
    relPopover.style.display = 'none';
  }, 400);
}

// ─── Text boxes & context menu ────────────────────────────────
let contextMenuClickX = 0, contextMenuClickY = 0;
let textBoxDragState = null;

function showContextMenu(e, textBoxId) {
  contextMenuClickX = e.clientX;
  contextMenuClickY = e.clientY;
  contextMenu.innerHTML = '';
  if (textBoxId) {
    var removeItem = document.createElement('div');
    removeItem.className = 'ctx-item';
    removeItem.id = 'ctxRemoveText';
    removeItem.innerHTML = '<span class="ctx-icon">\u274C</span> Remove';
    removeItem.addEventListener('click', function() {
      hideContextMenu();
      showConfirmModal('Remove Text Box', 'Are you sure you want to remove this text box?', function(confirmed) {
        if (confirmed) removeTextBox(textBoxId);
      });
    });
    contextMenu.appendChild(removeItem);
  }
  var addItem = document.createElement('div');
  addItem.className = 'ctx-item';
  addItem.id = 'ctxAddText';
  addItem.innerHTML = '<span class="ctx-icon">\uD83D\uDCDD</span> Add Text Box';
  addItem.addEventListener('click', function() {
    hideContextMenu();
    createTextBox(contextMenuClickX, contextMenuClickY);
  });
  contextMenu.appendChild(addItem);
  contextMenu.style.display = 'block';
  const cw = contextMenu.offsetWidth, ch = contextMenu.offsetHeight;
  let px = contextMenuClickX, py = contextMenuClickY;
  if (px + cw > window.innerWidth - 8) px = window.innerWidth - cw - 8;
  if (py + ch > window.innerHeight - 8) py = window.innerHeight - ch - 8;
  if (px < 8) px = 8;
  if (py < 8) py = 8;
  contextMenu.style.left = px + 'px';
  contextMenu.style.top = py + 'px';
}

function removeTextBox(id) {
  var el = document.getElementById(id);
  if (el) el.remove();
  state.textBoxes = state.textBoxes.filter(function(b) { return b.id !== id; });
  markTabDirty();
}

function hideContextMenu() {
  contextMenu.style.display = 'none';
}

function createTextBox(screenX, screenY) {
  const id = 'textbox-' + Date.now();
  const graphRect = graphEl.parentElement.getBoundingClientRect();
  const canvasPos = state.network.DOMtoCanvas({ x: screenX - graphRect.left, y: screenY - graphRect.top });
  const box = { id: id, text: '', x: canvasPos.x, y: canvasPos.y, width: 320, height: 80 };
  state.textBoxes.push(box);
  renderTextBox(box);
  markTabDirty();
  setTimeout(function() {
    const el = document.getElementById(id);
    if (el) { var c = el.querySelector('.text-box-content'); if (c) c.focus(); }
  }, 0);
}

function positionTextBox(el, box) {
  if (!state.network) return;
  const scale = state.network.getScale();
  const domPos = state.network.canvasToDOM({ x: box.x, y: box.y });
  el.style.left = domPos.x + 'px';
  el.style.top = domPos.y + 'px';
  el.style.width = (box.width * scale) + 'px';
  el.style.height = (box.height * scale) + 'px';
}

function updateTextBoxPositions() {
  if (!state.network) return;
  for (var i = 0; i < state.textBoxes.length; i++) {
    var el = document.getElementById(state.textBoxes[i].id);
    if (el) positionTextBox(el, state.textBoxes[i]);
  }
}

function growTextBox(el, box) {
  if (!state.network) return;
  const content = el.querySelector('.text-box-content');
  if (!content) return;
  const scale = state.network.getScale();
  const domH = content.scrollHeight + 16;
  const domW = content.scrollWidth + 16;
  const canvasW = domW / scale;
  const canvasH = domH / scale;
  if (canvasW > box.width) box.width = canvasW;
  if (canvasH > box.height) box.height = canvasH;
  positionTextBox(el, box);
}

function renderTextBox(box) {
  var el = document.getElementById(box.id);
  if (!el) {
    el = document.createElement('div');
    el.id = box.id;
    el.className = 'text-box';
    el.innerHTML = '<div class="text-box-content" contenteditable="plaintext-only" data-placeholder="Type here..."></div><div class="resize-handle"></div>';
    textBoxLayer.appendChild(el);
    el.addEventListener('mousedown', function(e) {
      if (e.target.closest('.resize-handle')) { startResize(e, box.id); return; }
      startDrag(e, box.id);
    });
    el.addEventListener('dblclick', function() {
      var c = el.querySelector('.text-box-content');
      if (c && !c.matches(':focus')) c.focus();
    });
    var content = el.querySelector('.text-box-content');
    content.addEventListener('input', function() {
      box.text = content.textContent;
      growTextBox(el, box);
      markTabDirty();
    });
    content.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') content.blur();
    });
  }
  positionTextBox(el, box);
  var content = el.querySelector('.text-box-content');
  if (content.textContent !== box.text) content.textContent = box.text;
  growTextBox(el, box);
}

function renderAllTextBoxes() {
  textBoxLayer.innerHTML = '';
  for (var i = 0; i < state.textBoxes.length; i++) {
    renderTextBox(state.textBoxes[i]);
  }
}

function startResize(e, boxId) {
  e.preventDefault(); e.stopPropagation();
  var el = document.getElementById(boxId);
  if (!el) return;
  var box = state.textBoxes.find(function(b) { return b.id === boxId; });
  if (!box) return;
  textBoxDragState = { id: boxId, mode: 'resize', startX: e.clientX, startY: e.clientY, startW: box.width, startH: box.height, started: true };
  document.addEventListener('mousemove', onTextBoxDragMove);
  document.addEventListener('mouseup', onTextBoxDragEnd);
}

function startDrag(e, boxId) {
  e.preventDefault();
  var el = document.getElementById(boxId);
  if (!el) return;
  var box = state.textBoxes.find(function(b) { return b.id === boxId; });
  if (!box) return;
  textBoxDragState = { id: boxId, mode: 'drag', startX: e.clientX, startY: e.clientY, startLeft: box.x, startTop: box.y, started: false };
  document.addEventListener('mousemove', onTextBoxDragMove);
  document.addEventListener('mouseup', onTextBoxDragEnd);
}

function onTextBoxDragMove(e) {
  if (!textBoxDragState) return;
  if (!state.network) return;
  var s = textBoxDragState;
  var el = document.getElementById(s.id);
  if (!el) return;
  var box = state.textBoxes.find(function(b) { return b.id === s.id; });
  if (!box) return;
  if (!s.started) {
    var dx = Math.abs(e.clientX - s.startX);
    var dy = Math.abs(e.clientY - s.startY);
    if (dx < 3 && dy < 3) return;
    s.started = true;
  }
  if (s.mode === 'drag') {
    var scale = state.network.getScale();
    box.x = s.startLeft + (e.clientX - s.startX) / scale;
    box.y = s.startTop + (e.clientY - s.startY) / scale;
    positionTextBox(el, box);
    markTabDirty();
  } else if (s.mode === 'resize') {
    var scale = state.network.getScale();
    var newW = Math.max(30, s.startW + (e.clientX - s.startX) / scale);
    var newH = Math.max(20, s.startH + (e.clientY - s.startY) / scale);
    var content = el.querySelector('.text-box-content');
    if (content) {
      el.style.width = (newW * scale) + 'px';
      el.style.height = 'auto';
      var minDomH = content.scrollHeight;
      var origW = el.style.width;
      el.style.width = '0px';
      content.style.whiteSpace = 'nowrap';
      var minDomW = content.scrollWidth;
      content.style.whiteSpace = '';
      el.style.width = origW;
      var minW = Math.max(30, (minDomW + 16) / scale);
      var minH = Math.max(20, (minDomH + 16) / scale);
      newW = Math.max(newW, minW);
      newH = Math.max(newH, minH);
    }
    box.width = newW;
    box.height = newH;
    positionTextBox(el, box);
    markTabDirty();
  }
}

function onTextBoxDragEnd() {
  document.removeEventListener('mousemove', onTextBoxDragMove);
  document.removeEventListener('mouseup', onTextBoxDragEnd);
  textBoxDragState = null;
}

function resolveEdges() {
  const visibleIds = new Set(state.nodes.get().map(n => n.id));
  const currentEdgeKeys = new Set(state.edges.get().map(e => e.from + '->' + e.to));
  const toAdd = [];

  // Map entity type names to catalog names (e.g. ApplicationComponent → ApplicationComponents)
  const typeToCatalog = {};
  for (const et of (state.meta?.entityTypes || [])) {
    typeToCatalog[et.name] = et.catalog;
  }

  for (const rel of (state.meta?.relationships || [])) {
    const sourceCatalog = typeToCatalog[rel.source];
    const targetCatalog = typeToCatalog[rel.target];
    if (!sourceCatalog || !targetCatalog) continue;
    const sourceEntries = state.entries[sourceCatalog] || [];
    const relColor = getRelColor(rel.description);

    for (const entry of sourceEntries) {
      if (!visibleIds.has(entry.id)) continue;
      const refVal = entry[rel.viaField];
      if (refVal == null) continue;
      const targets = Array.isArray(refVal) ? refVal : [refVal];
      for (const tid of targets) {
        if (tid == null || tid === '') continue;
        if (!visibleIds.has(tid)) continue;
        const key = entry.id + '->' + tid;
        if (currentEdgeKeys.has(key)) continue;
        toAdd.push({
          from: entry.id,
          to: tid,
          arrows: 'to',
          title: rel.description,
          color: { color: hexAlpha(relColor.color, 0.4), highlight: relColor.color },
        });
      }
    }
  }
  if (toAdd.length) state.edges.add(toAdd);
}

// Compute initial positions so sources sit left, targets right, flows center
function computeFlowPositions() {
  const positions = {};
  let flowCatalog = null;
  for (const et of (state.meta?.entityTypes || [])) {
    if (et.name === 'InformationFlow') { flowCatalog = et.catalog; break; }
  }
  if (!flowCatalog) return positions;
  const flows = state.entries[flowCatalog] || [];
  const netFlow = {};
  for (const flow of flows) {
    const src = flow.sourceApplicationComponentId;
    const tgt = flow.targetApplicationComponentId;
    if (src) netFlow[src] = (netFlow[src] || 0) + 1;
    if (tgt) netFlow[tgt] = (netFlow[tgt] || 0) - 1;
  }
  for (const [id, bal] of Object.entries(netFlow)) {
    if (bal > 0) positions[id] = { x: -350 + (Math.random() - 0.5) * 100, y: (Math.random() - 0.5) * 300 };
    else if (bal < 0) positions[id] = { x: 350 + (Math.random() - 0.5) * 100, y: (Math.random() - 0.5) * 300 };
    else positions[id] = { x: (Math.random() - 0.5) * 120, y: (Math.random() - 0.5) * 300 };
  }
  let i = 0;
  const n = flows.length;
  for (const flow of flows) {
    positions[flow.id] = { x: (Math.random() - 0.5) * 60, y: (i - (n - 1) / 2) * 50 + (Math.random() - 0.5) * 20 };
    i++;
  }
  return positions;
}

function updateNodeColors() {
  const searchActive = state.searchTerm.length > 0;
  const visible = state.nodes.get();
  for (const node of visible) {
    const cat = state.entryMap[node.id]?.catalog;
    if (!cat) continue;
    const color = CATALOG_COLORS[cat] || '#888';
    const isDimmed = state.dimmedNodes.has(node.id);
    state.nodes.update({
      id: node.id,
      color: {
        background: isDimmed ? hexAlpha(color, 0.5) : hexAlpha(color, 1),
        border: isDimmed ? hexAlpha(color, 0.4) : color,
      },
    });
  }
  if (searchActive) {
    const eVisible = state.edges.get();
    // Build catalog → entity type mapping (inverse of typeToCatalog)
    const catalogToType = {};
    for (const et of (state.meta?.entityTypes || [])) {
      catalogToType[et.catalog] = et.name;
    }
    for (const edge of eVisible) {
      const sDim = state.dimmedNodes.has(edge.from);
      const tDim = state.dimmedNodes.has(edge.to);
      const srcType = catalogToType[state.entryMap[edge.from]?.catalog];
      const tgtType = catalogToType[state.entryMap[edge.to]?.catalog];
      const rel = state.meta?.relationships.find(r => {
        return srcType === r.source && tgtType === r.target;
      });
      const relColor = rel ? getRelColor(rel.description) : { color: '#95a5a6' };
      state.edges.update({
        id: edge.id,
        color: {
          color: sDim || tDim ? hexAlpha(relColor.color, 0.06) : hexAlpha(relColor.color, 0.4),
          highlight: sDim || tDim ? hexAlpha(relColor.color, 0.06) : relColor.color,
        },
      });
    }
  }
}

// ─── Detail Panel ─────────────────────────────────────────────
function showDetail(nodeId) {
  const data = state.entryMap[nodeId];
  if (!data) return;
  state.selectedNodeId = nodeId;
  const { entry, catalog } = data;
  const title = entry.name + ' \u2014 ' + toTitle(catalog);
  dpTitle.textContent = title;

  let html = '<div class="dp-section"><h3>Fields</h3>';
  for (const [key, val] of Object.entries(entry)) {
    if (val == null || (Array.isArray(val) && val.length === 0)) continue;
    const label = formatFieldName(key);
    const targetCat = FIELD_REFMAP[key];
    let displayVal;
    if (targetCat && val && typeof val === 'string') {
      const ref = state.entryMap[val];
      if (ref) {
        const isVisible = state.visibleEntries.has(val);
        if (isVisible) {
          displayVal = `<a class="ref-link" data-id="${val}">${ref.entry.name} <span style="color:var(--text-muted);font-size:11px">(${toTitle(ref.catalog)})</span></a>`;
        } else {
          displayVal = `<span class="dimmed">${ref.entry.name} (${toTitle(ref.catalog)}) <span style="font-size:11px">\u2014 select catalog</span></span>`;
        }
      } else {
        displayVal = `<span style="color:var(--text-muted)">${val}</span>`;
      }
    } else if (targetCat && Array.isArray(val) && val.length > 0) {
      const parts = val.map(v => {
        const ref = state.entryMap[v];
        if (ref) {
          const isVisible = state.visibleEntries.has(v);
          return isVisible
            ? `<a class="ref-link" data-id="${v}">${ref.entry.name}</a>`
            : `<span class="dimmed">${ref.entry.name}</span>`;
        }
        return `<span style="color:var(--text-muted)">${v}</span>`;
      });
      displayVal = parts.join(', ');
    } else if (typeof val === 'boolean') {
      displayVal = val ? '\u2705' : '\u274C';
    } else {
      displayVal = String(val);
    }
    html += `<div class="dp-field"><span class="dp-label">${label}</span><span class="dp-value">${displayVal}</span></div>`;
  }
  html += '</div>';

  // Relationships section
  const allEdges = state.edges.get();
  const outbound = allEdges.filter(e => e.from === nodeId);
  const inbound = allEdges.filter(e => e.to === nodeId);
  html += '<div class="dp-section"><h3>Relationships</h3>';
  if (outbound.length === 0 && inbound.length === 0) {
    html += '<div class="empty">No relationships for this node</div>';
  } else {
    if (outbound.length) {
      html += '<div style="margin-bottom:6px"><strong style="font-size:12px;color:var(--text-secondary)">Outbound</strong></div>';
      for (const edge of outbound) {
        const target = state.entryMap[edge.to];
        if (!target) continue;
        html += `<div class="dp-rel"><span class="arrow">\u2192</span><span class="rel-target" data-id="${edge.to}">${target.entry.name}</span><span class="rel-desc">${edge.title}</span></div>`;
      }
    }
    if (inbound.length) {
      html += '<div style="margin:6px 0 4px"><strong style="font-size:12px;color:var(--text-secondary)">Inbound</strong></div>';
      for (const edge of inbound) {
        const source = state.entryMap[edge.from];
        if (!source) continue;
        html += `<div class="dp-rel"><span class="arrow">\u2190</span><span class="rel-target" data-id="${edge.from}">${source.entry.name}</span><span class="rel-desc">${edge.title}</span></div>`;
      }
    }
  }
  html += '</div>';

  dpBody.innerHTML = html;
  detailPanel.style.display = 'block';
  detailPanel.classList.add('open');

  // Attach click handlers for reference links
  dpBody.querySelectorAll('.ref-link').forEach(el => {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      const id = this.dataset.id;
      if (state.nodes.get(id)) {
        state.network.selectNodes([id]);
        state.network.focus(id, { scale: 1.5, animation: true });
        showDetail(id);
      }
    });
  });
  dpBody.querySelectorAll('.rel-target').forEach(el => {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      const id = this.dataset.id;
      if (state.nodes.get(id)) {
        state.network.selectNodes([id]);
        state.network.focus(id, { scale: 1.5, animation: true });
        showDetail(id);
      }
    });
  });
}

function closeDetail() {
  detailPanel.classList.remove('open');
  detailPanel.style.display = 'none';
  state.selectedNodeId = null;
}
